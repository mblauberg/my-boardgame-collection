<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="rgba(247,246,243,0.72)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Personal board game collection app with public browsing and private owner editing."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231c4d3c'/%3E%3Ccircle cx='20' cy='20' r='8' fill='%23f2e4c8'/%3E%3Ccircle cx='44' cy='20' r='8' fill='%23f2e4c8'/%3E%3Ccircle cx='20' cy='44' r='8' fill='%23f2e4c8'/%3E%3Ccircle cx='44' cy='44' r='8' fill='%23f2e4c8'/%3E%3C/svg%3E"
    />
    <title>My Boardgame Collection</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(theme);
        document.body.classList.add(theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? 'rgba(19,19,19,0.8)' : 'rgba(247,246,243,0.72)');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
